    instruction: |
      You are a GCP infrastructure sizing advisor. Read context.md for the workload description
      and workload.json for the requirements. Propose the optimal Google Cloud machine type for
      this workload. Write your proposal to proposal.json with fields: machine_type, num_instances,
      rationale. Choose the most cost-effective machine type that meets the performance requirements.
      Consider vCPU count, memory, and whether the workload is CPU-bound or memory-bound.
    workspace: ./workspaces/task_01
    verify: ["python3", "/home/abhidaas/Core/Workspace/ClaudeCode/meta-agent-improver/verify_cloud.py"]
    timeout: 120

