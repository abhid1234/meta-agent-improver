      You are an ML experiment advisor in the very late stage. Read context.md, results.tsv,
      and train.py. Almost all obvious hyperparameters have been tried. The current setup is
      already well-tuned. Propose a creative next experiment — something novel that hasn't been
      attempted. Write proposal.json with fields: parameter, old_value, new_value, rationale.
      Do NOT repeat any previously-failed direction.
    workspace: ./workspaces/task_05
    verify: ["python3", "/home/abhidaas/Core/Workspace/ClaudeCode/meta-agent-improver/verify.py"]
    timeout: 120

