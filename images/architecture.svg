<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="DM Sans, sans-serif">
  <!-- Background -->
  <rect width="760" height="300" fill="#fafaf8" rx="10"/>

  <!-- Title -->
  <text x="380" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e" letter-spacing="0.5">Meta-agent optimization loop</text>

  <!-- === Outer Loop Box === -->
  <rect x="40" y="50" width="200" height="180" rx="12" fill="#e8f0fe" stroke="#4285F4" stroke-width="2"/>
  <text x="140" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">OUTER LOOP</text>
  <text x="140" y="93" text-anchor="middle" font-size="11" fill="#6b7280">(proposer model)</text>
  <rect x="60" y="105" width="160" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="140" y="128" text-anchor="middle" font-size="12" fill="#2d2d3a">reads failure traces</text>
  <rect x="60" y="148" width="160" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="140" y="171" text-anchor="middle" font-size="12" fill="#2d2d3a">rewrites system prompt</text>
  <text x="140" y="215" text-anchor="middle" font-size="11" fill="#4285F4" font-weight="600">No fine-tuning · no gradients</text>

  <!-- Arrow: outer → inner (new prompt) -->
  <line x1="240" y1="140" x2="295" y2="140" stroke="#1a1a2e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="268" y="132" text-anchor="middle" font-size="11" fill="#6b7280">new prompt</text>

  <!-- === Inner Agent Box === -->
  <rect x="295" y="50" width="200" height="180" rx="12" fill="#fafaf8" stroke="#1a1a2e" stroke-width="2"/>
  <text x="395" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">INNER AGENT</text>
  <text x="395" y="93" text-anchor="middle" font-size="11" fill="#6b7280">(ML advisor model)</text>
  <rect x="315" y="105" width="160" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="395" y="128" text-anchor="middle" font-size="12" fill="#2d2d3a">reads experiment log</text>
  <rect x="315" y="148" width="160" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="395" y="171" text-anchor="middle" font-size="12" fill="#2d2d3a">proposes next hyperparam</text>
  <text x="395" y="215" text-anchor="middle" font-size="11" fill="#1a1a2e" font-weight="600">30 tasks · ground truth</text>

  <!-- Arrow: inner → verifier (proposal) -->
  <line x1="495" y1="140" x2="548" y2="140" stroke="#1a1a2e" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="522" y="132" text-anchor="middle" font-size="11" fill="#6b7280">proposal</text>

  <!-- === Verifier Box === -->
  <rect x="548" y="50" width="175" height="180" rx="12" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="635" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="#1a1a2e" letter-spacing="0.5">VERIFIER</text>
  <text x="635" y="93" text-anchor="middle" font-size="11" fill="#6b7280">(deterministic)</text>
  <rect x="565" y="105" width="140" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="635" y="128" text-anchor="middle" font-size="12" fill="#2d2d3a">checks ground truth</text>
  <rect x="565" y="148" width="140" height="36" rx="6" fill="white" stroke="#e5e7eb"/>
  <text x="635" y="171" text-anchor="middle" font-size="12" fill="#2d2d3a">pass / fail</text>
  <text x="635" y="215" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">No LLM judge</text>

  <!-- Feedback arrow: verifier → outer loop (failures) -->
  <path d="M 635 230 Q 635 268 390 268 Q 145 268 140 230" fill="none" stroke="#dc2626" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrow-red)"/>
  <text x="390" y="284" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">failure traces → next iteration</text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1a1a2e"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#dc2626"/>
    </marker>
  </defs>
</svg>
