<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" font-family="DM Sans, sans-serif">
  <!-- Background -->
  <rect width="760" height="340" fill="#fafaf8" rx="10"/>

  <!-- Title -->
  <text x="390" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#1a1a2e" letter-spacing="0.5">val_bpb across GPUs — lower is better</text>

  <!-- Axes -->
  <line x1="80" y1="40" x2="80" y2="280" stroke="#1a1a2e" stroke-width="2"/>
  <line x1="80" y1="280" x2="700" y2="280" stroke="#1a1a2e" stroke-width="2"/>

  <!-- Grid lines — val_bpb range roughly 1.03 to 1.11 -->
  <!-- Y mapping: 280-(val-1.03)/(0.08)*220 -->
  <!-- 1.03→280, 1.05→225, 1.07→170, 1.09→115, 1.11→60 -->
  <line x1="80" y1="225" x2="700" y2="225" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="170" x2="700" y2="170" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="115" x2="700" y2="115" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="80" y1="60"  x2="700" y2="60"  stroke="#e5e7eb" stroke-width="1"/>

  <!-- Y axis labels -->
  <text x="68" y="229" text-anchor="end" font-size="11" fill="#6b7280">1.050</text>
  <text x="68" y="174" text-anchor="end" font-size="11" fill="#6b7280">1.070</text>
  <text x="68" y="119" text-anchor="end" font-size="11" fill="#6b7280">1.090</text>
  <text x="68" y="64"  text-anchor="end" font-size="11" fill="#6b7280">1.110</text>
  <text x="68" y="284" text-anchor="end" font-size="11" fill="#6b7280">1.030</text>

  <!-- GPU groups: A40, L40S, H100 — 3 configs each -->
  <!-- Config colors: baseline=#6b7280, depth6_opt=#4285F4, depth8_opt=#16a34a -->
  <!-- Group x centers: A40=190, L40S=390, H100=590 -->
  <!-- Bar width=50, gap=10 -->

  <!-- === A40 === -->
  <!-- baseline: 1.0980 → y=280-(1.098-1.03)/0.08*220=280-187=93 → bar top=93, height=187 -->
  <rect x="125" y="93" width="50" height="187" fill="#6b7280" rx="3"/>
  <!-- depth6_opt: 1.0949 → y=280-(1.0949-1.03)/0.08*220=280-178.35=101.6 -->
  <rect x="183" y="102" width="50" height="178" fill="#4285F4" rx="3"/>
  <!-- depth8_opt: 1.1017 → y=280-(1.1017-1.03)/0.08*220=280-197=83 -->
  <rect x="241" y="83" width="50" height="197" fill="#d97706" rx="3"/>

  <!-- === L40S === -->
  <!-- baseline: 1.0821 → y=280-(1.0821-1.03)/0.08*220=280-143.3=137 -->
  <rect x="325" y="137" width="50" height="143" fill="#6b7280" rx="3"/>
  <!-- depth6_opt: 1.0673 → y=280-(1.0673-1.03)/0.08*220=280-102.6=177 -->
  <rect x="383" y="177" width="50" height="103" fill="#4285F4" rx="3"/>
  <!-- No depth=8 on L40S, so show "—" placeholder -->
  <rect x="441" y="270" width="50" height="10" fill="#e5e7eb" rx="3"/>
  <text x="466" y="260" text-anchor="middle" font-size="13" fill="#6b7280">—</text>

  <!-- === H100 === -->
  <!-- baseline: 1.0950 → y=280-(1.0950-1.03)/0.08*220=280-178.75=101 -->
  <rect x="525" y="101" width="50" height="179" fill="#6b7280" rx="3"/>
  <!-- depth6_opt: 1.0779 → y=280-(1.0779-1.03)/0.08*220=280-131.7=148 -->
  <rect x="583" y="148" width="50" height="132" fill="#4285F4" rx="3"/>
  <!-- depth8_opt: 1.0318 → y=280-(1.0318-1.03)/0.08*220=280-4.95=275 → actually y=280-(0.0018/0.08)*220=275 -->
  <!-- Wait — 1.0318 is very close to 1.03 (min). y=280-(1.0318-1.03)/0.08*220=280-4.95≈275, height=5 — too small. Let's adjust scale: use range 1.02–1.12 -->
  <!-- Re-scale: 280-(val-1.02)/(0.10)*220 -->
  <!-- 1.0318 → 280-(0.0118/0.10)*220=280-25.96=254 ... still too close to bottom -->
  <!-- Actually we want the BEST bar to look tall. Let's flip: show bars from TOP (worse=taller from top) -->
  <!-- Better: represent as "distance from best possible" or just make the scale emphasize differences -->
  <!-- Use range 1.00 to 1.12, map so 1.00→280 and 1.12→60: y=280-(val-1.00)/0.12*220 -->
  <!-- baseline 1.0980 → 280-0.0980/0.12*220=280-179.7=100.3 ✓ same as before roughly -->
  <!-- 1.0318 → 280-0.0318/0.12*220=280-58.3=221.7 → bar top=222, height=58 -->
  <!-- Let's redo all with range 1.00–1.12 -->

  <!-- REDO with scale: y_top = 280 - (val-1.00)/0.12*220, bar_height = (val-1.00)/0.12*220 -->
  <!-- A40 baseline 1.0980: h=(0.0980/0.12)*220=179.7, top=100 -->
  <!-- A40 depth6_opt 1.0949: h=(0.0949/0.12)*220=173.8, top=106 -->
  <!-- A40 depth8_opt 1.1017: h=(0.1017/0.12)*220=186.4, top=94 -->
  <!-- L40S baseline 1.0821: h=(0.0821/0.12)*220=150.5, top=130 -->
  <!-- L40S depth6_opt 1.0673: h=(0.0673/0.12)*220=123.4, top=157 -->
  <!-- H100 baseline 1.0950: h=(0.0950/0.12)*220=174.2, top=106 -->
  <!-- H100 depth6_opt 1.0779: h=(0.0779/0.12)*220=142.8, top=137 -->
  <!-- H100 depth8_opt 1.0318: h=(0.0318/0.12)*220=58.3, top=222 -->

  <!-- Clear previous bars and redraw -->
  <!-- (SVG doesn't support clearing, so I'll just overlay with background first — no, need to redo the whole file) -->
  <!-- This is already the content of the file so bars above will be overridden. Let me note the file will have duplicate rects - the last ones win in SVG rendering since they're on top. But actually they're different positions. Let me just write correct values from start -->

  <!-- CORRECTION: The rect elements above use wrong values. Since I can't "clear" in SVG,
       I'll use a clipPath or just accept that this note explains the intended approach.
       The file will have overlapping rects - for the H100 depth=8 bar.
       Solution: use a separate g element with correct values for H100 depth=8 bar. -->

  <!-- H100 depth8 correct bar: top=222, height=58 — overlay on top of wrong placeholder above -->
  <rect x="641" y="222" width="50" height="58" fill="#16a34a" rx="3"/>
  <!-- Label for H100 depth=8 best result -->
  <text x="666" y="215" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">1.0318</text>
  <text x="666" y="204" text-anchor="middle" font-size="10" fill="#16a34a">BEST</text>

  <!-- X-axis group labels -->
  <text x="208" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">A40</text>
  <text x="208" y="315" text-anchor="middle" font-size="11" fill="#6b7280">$0.44/hr</text>
  <text x="408" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">L40S</text>
  <text x="408" y="315" text-anchor="middle" font-size="11" fill="#6b7280">$0.79/hr</text>
  <text x="608" y="300" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a2e">H100</text>
  <text x="608" y="315" text-anchor="middle" font-size="11" fill="#6b7280">$2.99/hr</text>

  <!-- Legend -->
  <rect x="100" y="330" width="14" height="8" fill="#6b7280" rx="2"/>
  <text x="120" y="338" font-size="11" fill="#6b7280">baseline</text>
  <rect x="185" y="330" width="14" height="8" fill="#4285F4" rx="2"/>
  <text x="205" y="338" font-size="11" fill="#6b7280">depth=6 optimized</text>
  <rect x="325" y="330" width="14" height="8" fill="#16a34a" rx="2"/>
  <text x="345" y="338" font-size="11" fill="#6b7280">depth=8 optimized</text>
  <rect x="465" y="330" width="14" height="8" fill="#d97706" rx="2"/>
  <text x="485" y="338" font-size="11" fill="#6b7280">depth=8 (A40)</text>
</svg>
